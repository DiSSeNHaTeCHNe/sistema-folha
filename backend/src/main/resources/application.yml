spring:
  application:
    name: sistema-folha
  datasource:
    url: jdbc:postgresql://192.168.68.110:5433/sistema_folha
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  # Configurações para upload de arquivos
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

server:
  port: 8083
  servlet:
    context-path: /api
  # Configurações para upload de arquivos grandes
  connection-timeout: 300000 # 5 minutos
  tomcat:
    max-http-post-size: 50MB
    max-http-form-post-size: 50MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

jwt:
  secret: ${JWT_SECRET:techne_engenharia_sistemas_ltda_50_737_766_0001_21_2024_2025_2026_2027_2028_2029_2030}
  expiration: 86400000 # 24 horas em milissegundos
  refresh:
    expiration: 604800000 # 7 dias em milissegundos

logging:
  level:
    root: INFO
    br.com.techne.sistemafolha: DEBUG 